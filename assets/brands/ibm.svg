<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" role="img" aria-labelledby="title desc">
  <title id="title">IBM</title>
  <desc id="desc">Marca textual IBM em azul</desc>
  <rect width="320" height="120" rx="18" fill="#ffffff"/>
  <defs>
    <clipPath id="ibm-text">
      <text x="48" y="82" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="78" font-weight="900" letter-spacing="-4">IBM</text>
    </clipPath>
  </defs>
  <g clip-path="url(#ibm-text)" fill="#1f70c1">
    <rect x="34" y="28" width="250" height="8"/>
    <rect x="34" y="42" width="250" height="8"/>
    <rect x="34" y="56" width="250" height="8"/>
    <rect x="34" y="70" width="250" height="8"/>
    <rect x="34" y="84" width="250" height="8"/>
  </g>
</svg>

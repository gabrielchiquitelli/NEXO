<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Premium | Nexo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="bg-fixed"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <a href="index.html">
                    <img src="logo.png" alt="Nexo" class="logo-central">
                </a>
            </div>

            <div class="login-content">
                <h1 class="main-title">BEM-VINDO</h1>
                
                <form class="modern-form">
                    <div class="input-group">
                        <input type="email" id="email" required placeholder=" ">
                        <label for="email">USUÁRIO</label>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="pass" required placeholder=" ">
                        <label for="pass">SENHA</label>
                    </div>

                    <button type="submit" class="glow-button">
                        ENTRAR
                    </button>
                </form>

                <div class="login-footer-links">
                    <a href="registrar.html">Registrar-se</a>
                    <span class="separator">•</span>
                    <a href="#">Suporte</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

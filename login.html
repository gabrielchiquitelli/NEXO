<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesse a área do cliente Nexo Digital com sua conta Google.">
    <title>Entrar | Nexo Digital</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body data-auth-page="login">
    <main class="login-page">
        <section class="login-card">
            <a href="index.html" class="brand" aria-label="Voltar para Nexo Digital">
                <img src="logo.png" alt="Nexo Digital">
                <span>Nexo Digital</span>
            </a>

            <div class="auth-copy">
                <span class="eyebrow">Área do cliente</span>
                <h1>Entrar na sua conta</h1>
                <p class="lead">Use o mesmo Google usado no cadastro para acessar seu perfil, dados do projeto e próximos passos.</p>
            </div>

            <div class="auth-status" data-auth-status>Pronto para entrar com Google.</div>

            <button type="button" class="btn btn-primary auth-google-button" data-google-access>
                Entrar com Google
            </button>

            <p class="auth-switch">Primeira vez aqui? <a href="registrar.html">Cadastrar com Google</a></p>
            <p class="auth-back"><a href="index.html">Voltar ao site</a></p>
        </section>
    </main>

    <script type="module" src="auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crie seu acesso à área do cliente Nexo Digital.">
    <title>Cadastrar | Nexo Digital</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body data-auth-page="register">
    <a href="#main-content" class="skip-link">Pular para o conteudo principal</a>
    <main class="login-page" id="main-content" tabindex="-1">
        <section class="login-card login-card-wide">
            <a href="index.html" class="brand" aria-label="Voltar para Nexo Digital">
                <img src="logo.png" alt="Nexo Digital">
                <span>Nexo Digital</span>
            </a>

            <div class="auth-copy">
                <span class="eyebrow">Primeiro acesso</span>
                <h1>Criar sua conta</h1>
                <p class="lead">Cadastre com Google ou com e-mail e senha. Depois complete seu perfil e ative o desconto de boas-vindas.</p>
            </div>

            <div class="auth-status" data-auth-status role="status" aria-live="polite">Escolha como quer criar seu acesso.</div>

            <div class="auth-form auth-source-box">
                <div class="field">
                    <label for="register-source">Como você conheceu a Nexo?</label>
                    <select id="register-source" required>
                        <option value="">Selecione uma opção</option>
                        <option value="instagram">Instagram</option>
                        <option value="google">Google</option>
                        <option value="whatsapp">WhatsApp</option>
                        <option value="indicacao">Indicação de alguém</option>
                        <option value="site">Site da Nexo</option>
                        <option value="outro">Outro lugar</option>
                    </select>
                </div>
                <div class="field" data-register-referrer-field hidden>
                    <label for="register-referrer">Quem indicou?</label>
                    <input type="text" id="register-referrer" placeholder="Nome, e-mail ou código de indicação">
                </div>
            </div>

            <button type="button" class="btn btn-primary auth-google-button" data-google-access>
                Criar acesso com Google
            </button>

            <div class="auth-divider"><span>ou cadastre com e-mail</span></div>

            <form id="email-register-form" class="auth-form">
                <div class="field">
                    <label for="register-name">Nome completo</label>
                    <input type="text" id="register-name" placeholder="Seu nome" autocomplete="name" required>
                </div>
                <div class="field">
                    <label for="register-email">E-mail</label>
                    <input type="email" id="register-email" placeholder="contato@suaempresa.com" autocomplete="email" required>
                </div>
                <div class="form-grid form-grid-tight">
                    <div class="field">
                        <label for="register-password">Senha</label>
                        <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
                    </div>
                    <div class="field">
                        <label for="register-confirm">Confirmar senha</label>
                        <input type="password" id="register-confirm" placeholder="Repita a senha" autocomplete="new-password" minlength="6" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-outline auth-submit-button">Criar conta com e-mail</button>
            </form>

            <p class="auth-switch">Já criou seu acesso? <a href="login.html">Entrar</a></p>
            <p class="auth-back"><a href="index.html">Voltar ao site</a></p>
        </section>
    </main>

    <script src="accessibility.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Solicite cadastro na área do cliente Nexo Digital.">
    <title>Solicitar acesso | Nexo Digital</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <a href="index.html" class="brand" aria-label="Voltar para Nexo Digital">
                <img src="logo.png" alt="Nexo Digital">
                <span>Nexo Digital</span>
            </a>

            <div style="margin: 34px 0 24px;">
                <span class="eyebrow">Novo acesso</span>
                <h1 style="font-size: 34px; line-height: 1.1;">Solicite sua área do cliente</h1>
                <p class="lead" style="font-size: 15px; margin-top: 12px;">Envie seus dados e a Nexo retorna pelo WhatsApp para liberar o acesso quando seu projeto estiver ativo.</p>
            </div>

            <form id="split-register-form">
                <div class="field">
                    <label for="reg-name">Nome completo</label>
                    <input type="text" id="reg-name" placeholder="Seu nome" required>
                </div>
                <div class="field">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="contato@empresa.com" required>
                </div>
                <div class="field">
                    <label for="reg-phone">WhatsApp</label>
                    <input type="tel" id="reg-phone" placeholder="(00) 00000-0000" required>
                </div>
                <div class="field">
                    <label for="reg-password">Senha desejada</label>
                    <input type="password" id="reg-password" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Solicitar cadastro</button>
            </form>

            <p style="margin-top: 20px; color: var(--muted); font-size: 14px;">Já tem acesso? <a href="login.html">Entrar</a></p>
            <p style="margin-top: 10px; color: var(--muted); font-size: 14px;"><a href="index.html">Voltar ao site</a></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Criar Conta | Nexo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="bg-fixed"></div>

    <div class="login-wrapper">
        <div class="login-card register-card">
            <div class="login-header">
                <a href="index.html" class="login-logo-link">
                    <img src="logo.png" alt="Nexo" class="logo-central">
                </a>
                <span class="sub-line">Join the Network</span>
                <h1 class="main-title">CREATE ACCOUNT</h1>
            </div>

            <form class="modern-form">
                <div class="input-group">
                    <input type="text" id="fullname" required placeholder=" ">
                    <label for="fullname">Nome Completo</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">E-mail Corporativo</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="pass" required placeholder=" ">
                    <label for="pass">Definir Senha</label>
                </div>

                <div class="input-group">
                    <input type="password" id="confirm-pass" required placeholder=" ">
                    <label for="confirm-pass">Confirmar Senha</label>
                </div>

                <div class="terms-container">
                    <label class="check-box">
                        <input type="checkbox" required>
                        <span>Aceito os <a href="#">Termos</a> e <a href="#">Privacidade</a></span>
                    </label>
                </div>

                <button type="submit" class="glow-button">FINALIZAR</button>
            </form>

            <div class="login-footer-links">
                <span>Já é membro?</span>
                <a href="login.html" style="font-weight: 800; margin-left: 5px;">Entrar</a>
            </div>
        </div>
    </div>
</body>
</html>

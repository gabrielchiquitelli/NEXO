<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crie seu primeiro acesso à área do cliente Nexo Digital com Google.">
    <title>Cadastrar | Nexo Digital</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body data-auth-page="register">
    <main class="login-page">
        <section class="login-card">
            <a href="index.html" class="brand" aria-label="Voltar para Nexo Digital">
                <img src="logo.png" alt="Nexo Digital">
                <span>Nexo Digital</span>
            </a>

            <div class="auth-copy">
                <span class="eyebrow">Primeiro acesso</span>
                <h1>Cadastrar com Google</h1>
                <p class="lead">Na primeira vez, o Google cria sua conta no Firebase. Depois disso, é só entrar normalmente pela página de login.</p>
            </div>

            <div class="auth-status" data-auth-status>Comece criando seu acesso com Google.</div>

            <button type="button" class="btn btn-primary auth-google-button" data-google-access>
                Criar acesso com Google
            </button>

            <p class="auth-switch">Já criou seu acesso? <a href="login.html">Entrar com Google</a></p>
            <p class="auth-back"><a href="index.html">Voltar ao site</a></p>
        </section>
    </main>

    <script type="module" src="auth.js"></script>
</body>
</html>
